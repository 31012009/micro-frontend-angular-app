<header>
  <nav>
    <div>
      <h1>MFE App</h1>
    </div>
    <ul>
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
      <li><a routerLink="products" routerLinkActive="active">Products</a></li>
      <li><a routerLink="account" routerLinkActive="active">Account</a></li>
    </ul>
  </nav>
</header>
<style>
  :host {
    --gray-900: oklch(19.37% 0.006 300.98);
    --gray-700: oklch(36.98% 0.014 302.71);
    --gray-400: oklch(70.9% 0.015 304.04);

    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
      "Segoe UI Symbol";
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  header {
    position: fixed;
    inset: 0 0 auto 0;
    width: 100%;
    background: #000;
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  }

  nav {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  nav h1 {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 0;
    color: #fff;
  }

  nav ul {
    display: flex;
    gap: 1.5rem;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  nav li {
    margin: 0;
  }

  nav a {
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 0.01em;
    transition: color 0.25s ease, text-shadow 0.25s ease;
    position: relative;
  }

  nav a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0;
    height: 2px;
    background: orange;
    transition: width 0.25s ease;
  }

  nav a:hover,
  nav a.active {
    color: orange;
    animation: navLinkGlow 0.65s ease-in-out;
  }

  nav a:hover::after,
  nav a.active::after {
    width: 100%;
  }

  @keyframes navLinkGlow {
    0% {
      text-shadow: 0 0 0 rgba(255, 165, 0, 0);
    }

    50% {
      text-shadow: 0 0 14px rgba(255, 165, 0, 0.55);
    }

    100% {
      text-shadow: 0 0 0 rgba(255, 165, 0, 0);
    }
  }

  main {
    width: 100%;
    min-height: 200px;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 6.5rem 1rem 1rem;
    box-sizing: inherit;
    position: relative;
  }

  .angular-logo {
    max-width: 9.2rem;
  }

  .content {
    display: flex;
    justify-content: space-around;
    width: 100%;
    max-width: 700px;
  }

  .content h1 {
    margin-top: 1.75rem;
  }

  .content p {
    margin-top: 1.5rem;
  }
</style>
<section style="
    margin-top: 3rem;">
  <router-outlet />
</section>
